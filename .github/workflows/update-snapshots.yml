name: Update visual snapshots

# Temporary one-off: regenerates the Playwright visual baselines on the same
# Ubuntu/Chromium environment CI uses, then commits them back to the branch.
# Remove after the baselines are refreshed.
on:
  push:
    branches: [landing-new]

permissions:
  contents: write

concurrency:
  group: update-snapshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Regenerate visual snapshots
        run: npx playwright test visual.spec.ts --update-snapshots

      - name: Commit and push refreshed baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e
          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "test: regenerate Playwright visual baselines on CI"
            git push origin HEAD:landing-new
          fi
